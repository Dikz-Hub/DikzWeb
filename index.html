<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kumpulan Preset DikzPrst</title>
  <style>
    body {
      background: #0f0f0f;
      font-family: sans-serif;
      text-align: center;
      color: white;
    }

    h1 {
      margin-top: 30px;
    }

    .btn {
      display: block;
      margin: 15px auto;
      padding: 15px;
      width: 80%;
      max-width: 300px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <h1>Link Aku</h1>
  <div id="buttons"></div>

  <script>
    const sheetURL = "ISI_LINK_CSV_KAMU_DI_SINI";

    fetch(sheetURL)
      .then(res => res.text())
      .then(text => {
        const rows = text.split("\n").slice(1);
        const container = document.getElementById("buttons");

        rows.forEach(row => {
          if (!row) return;

          const [textBtn, color, link] = row.split(",");

          const a = document.createElement("a");
          a.className = "btn";
          a.innerText = textBtn;
          a.href = link;
          a.style.background = color;

          container.appendChild(a);
        });
      });
  </script>

</body>
</html>
