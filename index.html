<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kumpulan preset By DikzPrst</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  color: white;
  text-align: center;
}

video {
  display: block;
}

/* 🎥 Background video */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* overlay */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  z-index: -1;
}

/* 👤 Profile */
.profile {
  margin-top: 60px;
  margin-bottom: 30px;
}

.title {
  font-size: 14px;
  color: rgba(255,255,255,0.7);
  margin-top: -10px;
}

.profile img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 1px solid white;
  object-fit: cover;
}

.profile h2 {
  margin-top: 12px;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

/* 🔘 Buttons */
.btn {
  display: flex;
  align-items: center;
  gap: 12px;

  margin: 12px auto;
  padding: 14px;
  width: 85%;
  max-width: 320px;

  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-weight: bold;

  transition: 0.25s;
}

.btn img {
  height: 50px;
  width: auto;
  object-fit: contain;
  border-radius: 0;
}

.btn span {
  flex: 1;
  text-align: center;
}

.btn:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

.footer-title {
  margin-top: 30px;
  padding-top: 15px;
  border-top: 1px solid rgba(255,255,255,0.2);
  font-size: 13px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.5);
  text-align: center;
}

.popup {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 999;
}

.popup-box {
  position: relative;
  width: 170px;
  height: 95px; /* 16:9 */
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

/* 🖼️ gambar utama */
.popup-box img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* 🔥 biar nggak gepeng */
  position: absolute;
  top: 0;
  left: 0;
}

/* layer gelap */
.popup-box::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  top: 0;
  left: 0;
}

/* teks & tombol */
.popup-content {
  position: relative;
  z-index: 2;
  color: white;
  text-align: center;
  top: 50%;
  transform: translateY(-50%);
}

.popup-content button {
  margin-top: 8px;
  padding: 5px 10px;
  border: none;
  border-radius: 8px;
  background: rgba(37,211,102,0.3);
  color: white;
  font-weight: bold;
}

/* 🔻 Footer kecil */
.footer {
  margin-top: 40px;
  margin-bottom: 40px;
  display: flex;
  justify-content: center;
  gap: 20px;
}

.footer a {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  text-decoration: none;
  transition: 0.2s;
}

.footer a:hover {
  color: white;
}
</style>
</head>

<body>

<!-- 🎥 Video -->
<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- 👤 Profile -->
<div class="profile">
  <img src="pp.jpg">
  <h2>@DikzPreset</h2>

  <p class="title">Dikz Preset List<br>
<br>
Am Prem murah tinggal pencet CS aja</p>
</div>

<!-- 🎵 Popup -->
<div id="musicPopup" class="popup">
  <div class="popup-box">

    <!-- 🖼️ Gambar cover -->
    <img id="popupImg" src="music/cover1.jpg">

    <!-- konten -->
    <div class="popup-content">
      <p id="popupTitle">Klik buat play 😏</p>
      <button id="playBtn">Play</button>
    </div>

  </div>
</div>

<!-- 🎵 Audio -->
<audio id="bgMusic"></audio>

<!-- 🔘 Buttons -->
<div id="buttons"></div>

<!-- 🔻 Judul -->
<div class="footer-title">Dukungan bantuan</div>

<!-- 🔻 Footer -->
<div class="footer">
  <a href="https://wa.me/6283847900494" target="_blank">CS</a>
  <a href="https://tiktok.com/@hanzgntgbngt" target="_blank">TikTok</a>
  <a href="https://pin.it/3AC8H8wmu" target="_blank">Pinterest</a>
</div>

<audio id="clickSound" preload="auto">
  <source src="click.mp3" type="audio/mpeg">
</audio>

<script>

let playlist = [];
let current = 0;

const music = document.getElementById("bgMusic");
const playBtn = document.getElementById("playBtn");
const popupImg = document.getElementById("popupImg");
const popupTitle = document.getElementById("popupTitle");

// ambil data lagu
fetch('lagu.json')
  .then(res => res.json())
  .then(data => {
    playlist = data;
  });

// klik play
playBtn.addEventListener("click", () => {
  if (playlist.length === 0) return;

  current = Math.floor(Math.random() * playlist.length);

  // set lagu
  music.src = playlist[current].src;
  music.currentTime = 0;
  music.volume = 0.5;
  music.play();

  // set gambar & nama
  popupImg.src = playlist[current].img;
  popupTitle.innerText = playlist[current].name;

  // hilangin popup setelah play
  setTimeout(() => {
    document.getElementById("musicPopup").style.display = "none";
  }, 500);
});

fetch('data.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("buttons");

    data.forEach(btn => {
      const a = document.createElement("a");
      a.className = "btn";
      a.href = btn.link;
      a.target = "_blank";
      a.style.background = btn.color;

      // gambar
      const img = document.createElement("img");
      img.src = btn.img;

      // teks
      const span = document.createElement("span");
      span.innerText = btn.text;

a.addEventListener("click", () => {
  const sound = document.getElementById("clickSound");
  sound.currentTime = 0; // biar bisa spam klik
  sound.volume = 0.1; // 0.0 - 1.0
  sound.play();
});

      a.appendChild(img);
      a.appendChild(span);

      container.appendChild(a);
    });
  });
</script>

</body>
</html>
